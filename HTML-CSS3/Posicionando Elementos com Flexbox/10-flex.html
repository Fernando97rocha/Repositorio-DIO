<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .flex-container{
            max-width: 300px;
            border: solid black 2px;
            display: flex;
            margin: 10px;
        }

        .item{
            background-color: aquamarine;
            margin: 5px;
            text-align: center;
        }

        .flex1{
            flex: 1;
            /* grow = 1, shrink = 1, basis = 0 */
        }

        .flex2{
            flex: 2;
            /* grow = 2, shrink = 1, basis = 0 */
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="item flex1">A</div>
        <div class="item flex1">BBbbbbbbbbBB</div>
        <div class="item flex1">C</div>
        <div class="item flex1">D</div>
        <div class="item flex1">E</div>
    </div>
    <div class="flex-container">
        <div class="item flex1">A</div>
        <div class="item flex2">BBbbbbbbbbBB</div>
        <div class="item flex2">C</div>
        <div class="item flex1">D</div>
        <div class="item flex1">E</div>
    </div>
</body>
</html>
