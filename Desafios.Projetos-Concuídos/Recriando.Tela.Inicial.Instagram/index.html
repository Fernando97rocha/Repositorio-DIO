<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recriando a página inicial do Instagram</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/bd5318e5d0.js" crossorigin="anonymous"></script>
</head>
<body>
    <main>
        <section class="main-content">
            <div class="divmain">
                <div class="divcelular item">
                    <img src="./img/instagram-celular.png" alt="celular" class="imagemcelular">
                </div>

                <div class="formulario item">
                    <div class="form-entrada">
                        <img src="./img/instagram-logo.png" alt="logo do instagram" class="logoinstagram">
                        <input type="email" class="entradaemail entrada" placeholder="Telefone, nome de usuário ou email">
                        <input type="password" class="entrada password">
                        <input type="submit" class="btnEntrar" value="Entrar">

                        <p style="font-size: 13px;">OU</p>

                        <div class="loginfacebook">
                        <a href="#" class="linkloginfacebook"><i class="fa-brands fa-facebook-square"></i>Entrar com o Facebook</a>
                        </div>

                        <div class="linkesqueceusenha">
                        <a href="#">Esqueceu sua senha?</a>
                        </div>
                    </div>

                    <div class="cadastro">
                        <p>Não tem uma conta? <a href="#" class="linkcadastro">Cadastre-se</a></p>
                    </div>

                    <div class="downloadApp">
                        <p>Obtenha o aplicativo</p>
                        <a href="#"><img src="./img/apple-button.png" alt="botao download apple" class="imgdownload"></a>
                        <a href="#"><img src="./img/googleplay-button.png" alt="botao download android" class="imgdownload"></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="rodape">
            <p>&copy; 2022 Instagram by Fernando with  Digital Innovation One</p>
        </div>
    </footer>
</body>
</html>
